<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Educativo - Madrid</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="mobile-close" onclick="toggleSidebar()">
                        <span>Cerrar Panel ⬇️</span>
                </div>

                <div class="brand">
                    <span class="brand-icon">🎓</span>
                    <div>
                        <h1>Centros Públicos</h1>
                        <p class="subtitle">Comunidad de Madrid</p>
                    </div>
                </div>
                
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Buscar por nombre...">
                    <span class="search-icon">🔍</span>
                </div>

                <div class="filters-row">
                    <select id="filter-distrito">
                        <option value="todos">📍 Todos los distritos</option>
                    </select>
                    
                    <select id="filter-tipo">
                        <option value="todos">⚡ Todos los tipos</option>
                        <option value="IES">IES</option>
                        <option value="CEIPSO">CEIPSO</option>
                        <option value="CEPA">CEPA</option>
                    </select>
                </div>
            </header>

            <div class="list-container">
                <ul id="institutos-list">
                    <li class="loading">Cargando ecosistema educativo...</li>
                </ul>
            </div>
            
            <footer class="sidebar-footer">
                <div class="footer-stats">
                    Se han encontrado <span id="counter">0</span> centros
                </div>
                <div class="footer-credits">
                    <span>Creado por <span class="creator-name">Fernando Vegas</span></span>
                    <button onclick="abrirModalContacto()" class="contact-link" style="border:none; cursor:pointer; font-family: inherit;">✉️ Contactar</button>
                </div>
            </footer>
        </aside>

        <main id="map"></main>
        
        <button id="mobile-toggle" onclick="toggleSidebar()">
            <span>🔍</span> Ver Lista y Filtros
        </button>
    </div>

    <div id="modal-contacto" class="modal-overlay">
        <div class="modal-box">
            <span class="close-btn" onclick="cerrarModalContacto()">×</span>
            <h2 style="margin-bottom: 8px; color: var(--text-main);">Contactar a Fernando</h2>
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">Rellena el formulario y te responderé lo antes posible.</p>
            
            <form action="https://formsubmit.co/fvgaldos@hotmail.com" method="POST" class="contact-form">
                <input type="hidden" name="_subject" value="Nuevo mensaje desde el Dashboard de Institutos!">
                <input type="hidden" name="_captcha" value="false">
                
                <div class="form-group">
                    <label>Tu Nombre</label>
                    <input type="text" name="name" required placeholder="Ej: María López">
                </div>
                
                <div class="form-group">
                    <label>Tu Email</label>
                    <input type="email" name="email" required placeholder="Ej: maria@ejemplo.com">
                </div>
                
                <div class="form-group">
                    <label>Mensaje</label>
                    <textarea name="message" required placeholder="Escribe tu mensaje aquí..." rows="4"></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Enviar Mensaje 🚀</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/leaflet.smooth_marker_bouncing@3.3.1/dist/bundle.js"></script>
    
    <script>
        const map = L.map('map', { zoomControl: false }).setView([40.473, -3.641], 12);
        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO',
            maxZoom: 20
        }).addTo(map);

        let todosLosCentros = [];
        let controlRuta = null; 
        
        let marcadoresGrupo = L.markerClusterGroup({
            showCoverageOnHover: false,
            zoomToBoundsOnClick: true,
            maxClusterRadius: 50
        }).addTo(map);

        if (typeof L.Marker.setBouncingOptions === 'function') {
            L.Marker.setBouncingOptions({
                bounceHeight: 15,
                bounceSpeed: 54,
                exclusive: true
            });
        }

        const iconoColegio = L.divIcon({
            className: 'custom-marker',
            html: '<div class="marker-pin-glow"></div><div class="marker-pin"></div>',
            iconSize: [30, 30],
            iconAnchor: [15, 30],
            popupAnchor: [0, -30]
        });

        // Cargar JSON
        fetch('./institutos_filtrados.json')
            .then(res => {
                if(!res.ok) throw new Error("Error en red.");
                return res.json();
            })
            .then(data => {
                todosLosCentros = data;
                poblarSelectorDistritos(todosLosCentros);
                aplicarFiltrosCruzados();
            })
            .catch(err => {
                document.getElementById('institutos-list').innerHTML = `<li class="error">❌ Error al cargar JSON. ¿Estás usando un servidor local (Live Server)?</li>`;
            });

        function poblarSelectorDistritos(centros) {
            const selector = document.getElementById('filter-distrito');
            const distritosUnicos = [...new Set(centros.map(c => c.distrito).filter(Boolean))].sort();
            distritosUnicos.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d; opt.textContent = "📍 " + d;
                selector.appendChild(opt);
            });
        }

        function aplicarFiltrosCruzados() {
            const busquedaTexto = document.getElementById('search-input').value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const distritoSeleccionado = document.getElementById('filter-distrito').value;
            const tipoSeleccionado = document.getElementById('filter-tipo').value;

            const centrosFiltrados = todosLosCentros.filter(centro => {
                const nombreNorm = centro.nombre.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                const coincideTexto = nombreNorm.includes(busquedaTexto);
                const coincideDistrito = (distritoSeleccionado === "todos") || (centro.distrito === distritoSeleccionado);
                
                let coincideTipo = true;
                if (tipoSeleccionado !== "todos") {
                    coincideTipo = centro.nombre.toUpperCase().startsWith(tipoSeleccionado);
                }
                return coincideTexto && coincideDistrito && coincideTipo;
            });
            actualizarInterfaz(centrosFiltrados);
        }

        function obtenerTipoYNombre(nombreCompleto) {
            const up = nombreCompleto.toUpperCase();
            if (up.startsWith('IES')) return { tipo: 'IES', clase: 'badge-ies', resto: nombreCompleto.replace(/^IES\s+/i, '') };
            if (up.startsWith('CEIPSO')) return { tipo: 'CEIPSO', clase: 'badge-ceipso', resto: nombreCompleto.replace(/^CEIPSO\s+/i, '') };
            if (up.startsWith('CEPA')) return { tipo: 'CEPA', clase: 'badge-cepa', resto: nombreCompleto.replace(/^CEPA\s+/i, '') };
            return { tipo: 'CENTRO', clase: 'badge-otro', resto: nombreCompleto };
        }

        function actualizarInterfaz(centros) {
            marcadoresGrupo.clearLayers();
            cerrarRuta();

            const listaUL = document.getElementById('institutos-list');
            listaUL.innerHTML = '';

            if (centros.length === 0) {
                listaUL.innerHTML = '<li class="no-results">Ningún centro coincide.</li>';
                document.getElementById('counter').innerText = '0';
                return;
            }

            document.getElementById('counter').innerText = centros.length;

            centros.forEach((centro) => {
                const marcador = L.marker([centro.lat, centro.lng], { 
                    icon: iconoColegio,
                    bounceOnAdd: true 
                });
                
                const parseo = obtenerTipoYNombre(centro.nombre);

                // Botón inteligente de página web
                /*const enlaceWeb = centro.web;
                const botonWebHTML = enlaceWeb && enlaceWeb.trim() !== "" 
                    ? `<a href="${enlaceWeb.startsWith('http') ? enlaceWeb : 'https://' + enlaceWeb}" target="_blank" class="route-btn" style="background: #e2e8f0; color: #0f172a; margin-bottom: 4px;">🌐 Visitar web del centro ↗</a>` 
                    : '';*/

                    // --- NUEVO: Botón inteligente de página web MEJORADO ---
                let enlaceWeb = centro.web;
                let botonWebHTML = '';
                
                // Comprobamos que exista y que no diga "No consta" (típico en Madrid)
                if (enlaceWeb && enlaceWeb.trim() !== "" && enlaceWeb.toLowerCase() !== "no consta") {
                    // Limpiamos espacios accidentales
                    enlaceWeb = enlaceWeb.trim();
                    
                    // Si no tiene 'http', le ponemos 'http://' normal (muchos centros antiguos fallan con https://)
                    if (!enlaceWeb.startsWith('http')) {
                        enlaceWeb = 'http://' + enlaceWeb;
                    }
                    
                    botonWebHTML = `<a href="${enlaceWeb}" target="_blank" class="route-btn" style="background: #e2e8f0; color: #0f172a; margin-bottom: 4px;">🌐 Visitar web del centro ↗</a>`;
                }
                // ----------------------------------------------

                const contenidoPopup = `
                    <div class="map-popup">
                        <span class="badge ${parseo.clase}">${parseo.tipo}</span>
                        <h3>${parseo.resto}</h3>
                        <p><strong>Distrito:</strong> ${centro.distrito || 'Madrid'}</p>
                        
                        <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 10px;">
                            
                            ${botonWebHTML}

                            <button onclick="calcularRutaGPS(${centro.lat}, ${centro.lng})" class="route-btn">
                                📍 Ruta desde mi ubicación (GPS)
                            </button>
                            
                            <div style="background: #f1f5f9; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; margin-top: 4px;">
                                <p style="font-size: 11.5px; margin-bottom: 6px; font-weight: 600; color: var(--text-main);">✏️ O escribe desde dónde sales:</p>
                                <input type="text" id="origen-manual-${centro.lat}" placeholder="Ej: Atocha, Madrid" style="width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 12px; margin-bottom: 8px; outline: none; box-sizing: border-box;">
                                <button onclick="calcularRutaManual(${centro.lat}, ${centro.lng})" class="route-btn" style="background: var(--text-muted); width: 100%; padding: 8px;">
                                    Trazar ruta al instituto
                                </button>
                            </div>

                            <a href="https://www.google.com/maps/dir/?api=1&destination=${centro.lat},${centro.lng}" target="_blank" class="route-btn google-btn" style="margin-top: 4px;">
                                🗺️ Abrir en Google Maps ↗
                            </a>
                        </div>
                    </div>
                `;
                marcador.bindPopup(contenidoPopup);
                
                marcador.on('click', function() {
                    if (typeof this.bounce === 'function') this.bounce(2);
                });

                marcadoresGrupo.addLayer(marcador);

                const li = document.createElement('li');
                li.className = `instituto-item border-${parseo.tipo.toLowerCase()}`;
                li.innerHTML = `
                    <div class="item-layout">
                        <div class="item-info">
                            <span class="item-title">${parseo.resto}</span>
                            <span class="item-district">📍 ${centro.distrito || 'Madrid'}</span>
                        </div>
                        <span class="badge ${parseo.clase}">${parseo.tipo}</span>
                    </div>
                `;

                // Event listener corregido (sin duplicados)
                li.addEventListener('click', () => {
                    marcadoresGrupo.zoomToShowLayer(marcador, () => {
                        map.flyTo([centro.lat, centro.lng], 16, { animate: true, duration: 1 });
                        marcador.openPopup();
                        if (typeof marcador.bounce === 'function') marcador.bounce(2);
                    });
                    
                    document.querySelectorAll('.instituto-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');

                    // Cerrar el panel automáticamente si estamos en móvil
                    if (window.innerWidth <= 768) {
                        document.querySelector('.sidebar').classList.remove('active');
                    }
                });

                listaUL.appendChild(li);
            });
        }

        // --- SISTEMA DE RUTAS ---
        window.calcularRutaGPS = function(destLat, destLng) {
            map.closePopup(); 
            if (!navigator.geolocation) {
                alert("Tu navegador no soporta GPS.");
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (position) => dibujarLineaRuta(position.coords.latitude, position.coords.longitude, destLat, destLng),
                (error) => alert("No pudimos acceder a tu ubicación. Escribe tu calle manualmente."),
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
        };

        window.calcularRutaManual = function(destLat, destLng) {
            const inputElement = document.getElementById(`origen-manual-${destLat}`);
            if (!inputElement) return;

            const inputOrigen = inputElement.value;
            if (!inputOrigen || inputOrigen.trim() === '') {
                alert("Por favor, escribe una calle o ciudad primero.");
                return;
            }
            map.closePopup();

            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(inputOrigen + ', Madrid')}&limit=1`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.length > 0) {
                        dibujarLineaRuta(parseFloat(data[0].lat), parseFloat(data[0].lon), destLat, destLng);
                    } else {
                        alert("No hemos encontrado esa dirección.");
                    }
                })
                .catch(err => alert("Hubo un error al buscar la dirección."));
        };

        function dibujarLineaRuta(origenLat, origenLng, destLat, destLng) {
            cerrarRuta();

            const waypoints = [L.latLng(origenLat, origenLng), L.latLng(destLat, destLng)];

            controlRuta = L.Routing.control({
                waypoints: waypoints,
                routeWhileDragging: false,
                show: false, 
                lineOptions: { styles: [{ color: '#4f46e5', opacity: 0.9, weight: 6 }] },
                createMarker: function() { return null; }
            })
            .on('routesfound', function(e) {
                const ruta = e.routes[0];
                const distanciaKm = (ruta.summary.totalDistance / 1000).toFixed(1); 
                const tiempoCocheMin = Math.round(ruta.summary.totalTime / 60); 
                const tiempoPublicoMin = Math.round((tiempoCocheMin * 1.5) + 12);
                mostrarPanelResumen(distanciaKm, tiempoCocheMin, tiempoPublicoMin);
            })
            .addTo(map);
        }

        function mostrarPanelResumen(distancia, coche, publico) {
            const ResumenControl = L.Control.extend({
                options: { position: 'topright' },
                onAdd: function () {
                    const div = L.DomUtil.create('div', 'panel-resumen-ruta');
                    div.innerHTML = `
                        <h4 style="margin: 0 0 12px 0; color: #0f172a; font-size: 14px; text-align: center;">Resumen del trayecto</h4>
                        <div style="display: flex; flex-direction: column; gap: 8px; font-size: 13px;">
                            <div style="display: flex; justify-content: space-between;">
                                <span>📏 Distancia:</span> <strong>${distancia} km</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between;">
                                <span>🚗 En coche:</span> <strong>~${coche} min</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px;">
                                <span>🚌 Transp. Público:</span> <strong>~${publico} min</strong>
                            </div>
                        </div>
                        <p style="font-size: 10.5px; color: #94a3b8; margin-top: 8px; text-align: center; line-height: 1.2;">
                            Usa el botón de Google Maps para indicaciones paso a paso.
                        </p>
                        <button onclick="cerrarRuta()" class="route-btn" style="background: #e2e8f0; color: #475569; margin-top: 10px;">
                            Cerrar ruta ✖
                        </button>
                    `;
                    return div;
                }
            });

            window.panelResumen = new ResumenControl();
            map.addControl(window.panelResumen);
        }

        window.cerrarRuta = function() {
            if (controlRuta) map.removeControl(controlRuta);
            if (window.panelResumen) map.removeControl(window.panelResumen);
        };

        // --- SISTEMA DE CONTACTO (MODAL) ---
        window.abrirModalContacto = function() {
            document.getElementById('modal-contacto').style.display = 'flex';
        };

        window.cerrarModalContacto = function() {
            document.getElementById('modal-contacto').style.display = 'none';
        };

        window.onclick = function(event) {
            const modal = document.getElementById('modal-contacto');
            if (event.target === modal) {
                modal.style.display = "none";
            }
        };

        // Abrir / Cerrar el panel lateral en móviles
        window.toggleSidebar = function() {
            document.querySelector('.sidebar').classList.toggle('active');
        };
        
        // Listeners globales
        document.getElementById('search-input').addEventListener('input', aplicarFiltrosCruzados);
        document.getElementById('filter-distrito').addEventListener('change', aplicarFiltrosCruzados);
        document.getElementById('filter-tipo').addEventListener('change', aplicarFiltrosCruzados);
    </script>
</body>
</html>
